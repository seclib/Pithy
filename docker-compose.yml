services:

  pithy:
    build: .
    container_name: pithy_core
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 2G
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - CHROMA_URL=http://chroma:8000
      - DEFAULT_MODEL=dolphin-mistral:7b
      - CODE_MODEL=qwen2.5-coder:7b
      - EMBED_MODEL=nomic-embed-text
      - SAFE_MODE=true
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./plugins:/app/plugins
    depends_on:
      chroma:
        condition: service_healthy
    networks:
      - pithy-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true

  chroma:
    image: chromadb/chroma:latest
    container_name: pithy_chroma
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 4G
    volumes:
      - ./data/db:/chroma/chroma
    networks:
      - pithy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  pithy-network:
    driver: bridge
